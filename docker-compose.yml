services:
  db:
    image: postgres:15-alpine
    container_name: battlegame_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: battlegame
      POSTGRES_USER: bguser
      POSTGRES_PASSWORD: bgpassword123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bguser -d battlegame"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: BattleGame.Server/Dockerfile
    container_name: battlegame_server
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - DB_CONNECTION=Host=db;Port=5432;Database=battlegame;Username=bguser;Password=bgpassword123
      - SERVER_PORT=9000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
